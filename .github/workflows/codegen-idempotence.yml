name: Codegen Idempotence
on:
  pull_request:
    paths:
      - 'scripts/gen-preload.ts'
      - 'packages/contracts-parse/src/ipc/**'
      - 'apps/desktop-main/src/preload.generated.cts'
      - 'packages/contracts/src/ipc/lucid-api.generated.ts'
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Run codegen
        run: npx tsx scripts/gen-preload.ts
      - name: Verify no diff
        run: |
          if ! git diff --exit-code \
            apps/desktop-main/src/preload.generated.cts \
            packages/contracts/src/ipc/lucid-api.generated.ts; then
            echo "::error::Codegen artifacts out of date. Run 'npx tsx scripts/gen-preload.ts' and commit."
            exit 1
          fi
          echo "✓ Codegen artifacts are up to date."
