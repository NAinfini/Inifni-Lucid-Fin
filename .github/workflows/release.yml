name: Release

on:
  push:
    tags: ['v*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  NODE_OPTIONS: '--max-old-space-size=4096'

jobs:
  cleanup:
    name: Clean Previous Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Delete existing release for this tag (if any)
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag=false 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: cleanup
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Rebuild native modules
        run: npm rebuild better-sqlite3

      - name: Build all packages (ordered)
        run: npm run build

      - name: Package installer (local only, no publish)
        run: npx electron-builder --config electron-builder.json --${{ matrix.platform }} --publish=never
        working-directory: apps/desktop-main

      - name: List built artifacts
        run: ls -R apps/desktop-main/release/ || echo "No release files"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            apps/desktop-main/release/*.exe
            apps/desktop-main/release/*.dmg
            apps/desktop-main/release/*.zip
            apps/desktop-main/release/*.AppImage
            apps/desktop-main/release/*.deb
            apps/desktop-main/release/*.blockmap
            apps/desktop-main/release/*.yml
            apps/desktop-main/release/*.yaml
          if-no-files-found: warn

  publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish Release

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded artifacts
        run: find artifacts -type f | sort || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
