name: CI

on:
  push:
    branches: [main, dev, 'feature/**']
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Build, Type Check, Test, Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm rebuild better-sqlite3

      - name: 1/4 Build (ordered workspace deps)
        run: npm run build

      - name: 2/4 Type Check
        run: |
          npx tsc --noEmit -p packages/contracts/tsconfig.json
          npx tsc --noEmit -p packages/application/tsconfig.json
          npx tsc --noEmit -p packages/adapters-ai/tsconfig.json

      - name: 3/4 Test
        run: npx vitest run --reporter=verbose
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: 4/4 Lint
        run: npx eslint . --max-warnings=0
